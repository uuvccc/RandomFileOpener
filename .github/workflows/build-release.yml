name: Build and Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        refreshenv
      shell: powershell

    - name: Add MinGW to PATH
      run: |
        $env:Path = "C:\ProgramData\mingw64\mingw64\bin;$env:Path"
        [Environment]::SetEnvironmentVariable("Path", "C:\ProgramData\mingw64\mingw64\bin;$env:Path", "Process")
        Write-Host "MinGW added to PATH"
        gcc --version
      shell: powershell

    - name: Compile
      run: |
        C:\ProgramData\mingw64\mingw64\bin\gcc.exe -o RandomFileOpener.exe main.c -mwindows
      shell: cmd

    - name: Verify build
      run: |
        if (Test-Path RandomFileOpener.exe) {
          Write-Host "Build successful!"
          Get-Item RandomFileOpener.exe | Format-List Name,Length
        } else {
          Write-Error "Build failed - executable not found"
          exit 1
        }
      shell: powershell

    - name: Generate version
      id: version
      run: |
        $version = "1.0.$($env:GITHUB_RUN_NUMBER)"
        Write-Host "Generated version: $version"
        echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: powershell

    - name: Create release notes
      run: |
        $notes = @"
        Automated release v${{ steps.version.outputs.version }}

        Changes:
        - Build #${{ github.run_number }}
        - Commit: `${{ github.sha }}
        - Author: @${{ github.actor }}

        ## Downloads
        - RandomFileOpener.exe
        "@
        $notes | Out-File -FilePath release-notes.md -Encoding UTF8
        Write-Host "Release notes created"
        Get-Content release-notes.md
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: RandomFileOpener
        path: RandomFileOpener.exe
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body_path: release-notes.md
        files: RandomFileOpener.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup
      run: |
        if (Test-Path release-notes.md) {
          Remove-Item release-notes.md -Force
        }
      shell: powershell

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check build status
      run: |
        if [[ "${{ needs.build.result }}" == "success" ]]; then
          echo "Build and release completed successfully!"
        else
          echo "Build or release failed!"
          exit 1
        fi
      shell: bash
